# .gitlab/ci/common-setup.yml

.common_setup:
  cache:
    paths:
      - '.cargo_cache/'
      - 'vorago-shared-hal/target/'
      - 'va108xx/target/'
      - 'va416xx/target/'
    key: cargo-cache

.rust_setup_thumbv7em:
  extends: .common_setup
  before_script:
    - rustup target add thumbv7em-none-eabihf

.rust_setup_thumbv6m:
  extends: .common_setup
  before_script:
    - rustup target add thumbv6m-none-eabi

.rust_setup_both_targets:
  extends: .common_setup
  before_script:
    - rustup target add thumbv7em-none-eabihf thumbv6m-none-eabi

.nextest_setup:
  extends: .common_setup
  before_script:
    - cargo install cargo-nextest
